  - type: dropdown
    attributes:
      label: "Comments are used appropriately in React components."
      options:
        - "Yes"
        - "No"
    validations:
      required: true      
  - type: dropdown
    attributes:
      label: "Components use `useState` effectively to control React variable values and states."
      options:
        - "Yes"
        - "No"
    validations:
      required: true
  - type: dropdown
    attributes:
      label: "Markup included in `JSX` is compact and focused solely on the control created."
      options:
        - "Yes"
        - "No"
    validations:
      required: true
  - type: textarea
    attributes:
      label: "Provide examples of excessive `JSX`"
      description: In the text area above, provide references to components which contain too much JSX content.
      value: |
